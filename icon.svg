<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2e1c0e"/>
      <stop offset="100%" stop-color="#0d0906"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="50%" stop-color="#c8903e"/>
      <stop offset="100%" stop-color="#9a6020"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8aa50"/>
      <stop offset="100%" stop-color="#b07820"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle grain texture overlay -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#c8903e" stroke-width="6" opacity="0.15"/>

  <!-- Letter D - outer shape with inner cutout using fill-rule evenodd -->
  <path fill-rule="evenodd"
    d="M 85 80 L 85 432 L 240 432
       C 410 432 430 348 430 256
       C 430 164 410 80 240 80 Z
       M 158 155 L 158 357 L 228 357
       C 348 357 358 316 358 256
       C 358 196 348 155 228 155 Z"
    fill="url(#gold)"/>

  <!-- Fork accent - top right area -->
  <g transform="translate(368, 52)" opacity="0.85">
    <!-- Tines -->
    <rect x="4"  y="0" width="9" height="52" rx="4.5" fill="url(#gold2)"/>
    <rect x="22" y="0" width="9" height="52" rx="4.5" fill="url(#gold2)"/>
    <rect x="40" y="0" width="9" height="52" rx="4.5" fill="url(#gold2)"/>
    <!-- Join curve -->
    <path d="M 4 52 Q 8 74 26.5 78 Q 45 74 49 52" fill="none" stroke="url(#gold2)" stroke-width="9" stroke-linecap="round"/>
    <!-- Handle -->
    <rect x="22" y="78" width="9" height="62" rx="4.5" fill="url(#gold2)"/>
  </g>

  <!-- Small dot accent -->
  <circle cx="430" cy="400" r="12" fill="#c8903e" opacity="0.4"/>
  <circle cx="100" cy="440" r="8" fill="#c8903e" opacity="0.25"/>
</svg>
